<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produtos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <h1>Cadastro de Produtos</h1>
        <nav>
            <ul>
                <li><a href="/">Início</a></li>
                <li><a href="/usuarios">Usuários</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <form>
            <label for="codigo">Código</label>
            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 20px;">
                <input type="text" id="codigo" name="codigo" placeholder="Digite ou gere o código" required style="margin-bottom: 0; flex: 1;">
                <button type="button" onclick="gerarCodigo()" style="width: 45px; height: 45px; padding: 0; border-radius: 8px; font-size: 20px;">@</button>
            </div>
            
            <label for="descricao">Descrição</label>
            <input type="text" id="descricao" name="descricao" placeholder="Digite a descrição do produto" required>

            <label for="preco">Preço</label>
            <input type="number" id="preco" name="preco" step="0.01" placeholder="Digite o preço" required>

            <button type="submit">Cadastrar Produto</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Sistema de Gestão. Todos os direitos reservados.</p>
    </footer>
    <script>
        function gerarCodigo() {
            const numero = Math.floor(Math.random() * 90000) + 10000;
            document.getElementById('codigo').value = numero;
        }
    </script>
</body>
</html>
