<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Front-end - Calculadora</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .container {
            max-width: 600px;
            margin: 30px auto;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #34495e;
        }
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .resultado-box {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 5px solid #27ae60;
        }
        .resultado-box.erro {
            border-left-color: #e74c3c;
        }
        .resultado-box h3 {
            margin-bottom: 10px;
            color: #2c3e50;
        }
        .resultado-box p {
            font-size: 18px;
            color: #333;
        }
        .resultado-box .destaque {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .historico {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 5px solid #3498db;
        }
        .historico ul {
            list-style: none;
            padding: 0;
        }
        .historico li {
            padding: 8px 12px;
            margin-bottom: 5px;
            background: white;
            border-radius: 5px;
            border: 1px solid #e0e0e0;
        }
        .btn-limpar {
            background: #e74c3c;
            margin-top: 10px;
        }
        .btn-limpar:hover {
            background: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(231, 76, 60, 0.4);
        }
        nav {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        nav a {
            padding: 10px 20px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        nav a:hover {
            background: #2980b9;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧮 Calculadora Front-end</h1>
        <p>Digite dois números e clique em "Calcular" para ver o resultado!</p>

        <form id="calcForm">
            <div class="form-group">
                <label for="num1">Número 1:</label>
                <input type="number" id="num1" name="num1" step="any" required placeholder="Digite o primeiro número">
            </div>
            <div class="form-group">
                <label for="num2">Número 2:</label>
                <input type="number" id="num2" name="num2" step="any" required placeholder="Digite o segundo número">
            </div>
            <button type="submit" id="btnCalcular">Calcular</button>
        </form>

        <div id="resultadoContainer" class="resultado-box">
            <h3>📊 Resultado</h3>
            <p>Aguardando cálculo...</p>
        </div>

        <div id="historicoContainer" class="historico">
            <h3>📜 Histórico de Cálculos</h3>
            <ul id="historicoLista"></ul>
            <button id="btnLimparHistorico" class="btn-limpar">Limpar Histórico</button>
        </div>

        <nav>
            <a href="/">🏠 Voltar à Página Inicial</a>
            <a href="/autor">👤 Sobre o Autor</a>
        </nav>
    </div>

    <script>
        // ==================== 1. Ouvir o clique do botão ====================
        document.getElementById('btnCalcular').addEventListener('click', function(e) {
            e.preventDefault(); // Evita o recarregamento da página
            
            // ==================== 2. Receber valores do formulário ====================
            const num1 = parseFloat(document.getElementById('num1').value);
            const num2 = parseFloat(document.getElementById('num2').value);
            
            // ==================== 3. Fazer conta ====================
            const soma = num1 + num2;
            const subtracao = num1 - num2;
            const multiplicacao = num1 * num2;
            const divisao = num2 !== 0 ? num1 / num2 : 'Divisão por zero!';
            
            // ==================== 4. Adicionar elemento HTML ====================
            const container = document.getElementById('resultadoContainer');
            
            // Limpa o container (remove elementos antigos)
            container.innerHTML = '';
            
            // Cria novo elemento HTML (adicionar elemento HTML)
            const novoElemento = document.createElement('div');
            
            // ==================== 5. Escrever resultado no elemento HTML ====================
            novoElemento.innerHTML = `
                <h3>📊 Resultado</h3>
                <p><strong>Soma:</strong> <span class="destaque">${soma}</span></p>
                <p><strong>Subtração:</strong> <span class="destaque">${subtracao}</span></p>
                <p><strong>Multiplicação:</strong> <span class="destaque">${multiplicacao}</span></p>
                <p><strong>Divisão:</strong> <span class="destaque">${divisao}</span></p>
            `;
            
            // ==================== 6. Adicionar (appendChild) ====================
            container.appendChild(novoElemento);
            
            // ==================== 7. Apagar classe CSS ====================
            container.classList.remove('erro');
            
            // Se houve erro na divisão, adiciona classe de erro
            if (divisao === 'Divisão por zero!') {
                container.classList.add('erro');
            }
            
            // ==================== EXTRA: Adicionar ao histórico ====================
            adicionarHistorico(num1, num2, soma, subtracao, multiplicacao, divisao);
            
            // Limpar campos
            document.getElementById('num1').value = '';
            document.getElementById('num2').value = '';
            document.getElementById('num1').focus();
        });

        // ==================== FUNÇÃO PARA ADICIONAR AO HISTÓRICO ====================
        function adicionarHistorico(num1, num2, soma, sub, mult, div) {
            const lista = document.getElementById('historicoLista');
            const item = document.createElement('li');
            
            const divTexto = (div === 'Divisão por zero!') ? 'Divisão por zero!' : div;
            
            item.textContent = `${num1} + ${num2} = ${soma}  |  ${num1} × ${num2} = ${mult}  |  ${num1} ÷ ${num2} = ${divTexto}`;
            
            lista.appendChild(item);
        }

        // ==================== LIMPAR HISTÓRICO ====================
        document.getElementById('btnLimparHistorico').addEventListener('click', function() {
            const lista = document.getElementById('historicoLista');
            lista.innerHTML = '';
        });

        // ==================== ENTER PARA CALCULAR ====================
        document.getElementById('calcForm').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('btnCalcular').click();
            }
        });
    </script>
</body>
</html>
